services:

  postgres:
    image: postgres:16
    container_name: RS_Logstream_Postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - logstream-net

  logstream-api:
    build:
      context: ../src/BackEnd
      dockerfile: ./RS.Logstream.API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DatabaseProvider=Postgres
      - ConnectionStrings__ConnPostgres=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    networks:
      - logstream-net

volumes:
  postgres-data:

networks:
  logstream-net:
    driver: bridge
